services:
  php:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: capstone_php
    working_dir: /var/www/backend
    command:
      - /bin/sh
      - -c
      - |
        mkdir -p /var/www/backend/storage/app/public/avatars
        chown -R www-data:www-data /var/www/backend/storage /var/www/backend/bootstrap/cache
        chmod -R 775 /var/www/backend/storage /var/www/backend/bootstrap/cache
        php artisan storage:link --force
        php-fpm
    volumes:
      - ./backend:/var/www/backend
      - ./php/opcache.ini:/usr/local/etc/php/conf.d/opcache.ini
      - ./php/www.conf:/usr/local/etc/php-fpm.d/www.conf
    depends_on:
      - mysql
      - redis
    networks:
      - capstone_network

  queue-worker:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: capstone_queue
    working_dir: /var/www/backend
    command:
      - /bin/sh
      - -c
      - |
        sleep 10
        php artisan queue:work --sleep=3 --tries=3 --timeout=60
    volumes:
      - ./backend:/var/www/backend
      - ./php/opcache.ini:/usr/local/etc/php/conf.d/opcache.ini
      - ./php/www.conf:/usr/local/etc/php-fpm.d/www.conf
    depends_on:
      - mysql
      - redis
      - php
    restart: always
    networks:
      - capstone_network
  nginx:
    image: nginx:alpine
    container_name: capstone_nginx
    ports:
      - "8070:80"
    volumes:
      - ./backend:/var/www/backend
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - php
    networks:
      - capstone_network

  admin-web:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
    container_name: capstone_admin
    restart: unless-stopped
    ports:
      - "3000:5173"
    volumes:
      - ./admin-web:/app
      - /app/node_modules
    networks:
      - capstone_network

  mysql:
    image: mysql:8.0
    container_name: capstone_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: capstone_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: capstone_user
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - capstone_network

  redis:
    image: redis:alpine
    container_name: capstone_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - capstone_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: capstone_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
      UPLOAD_LIMIT: 200M
    depends_on:
      - mysql
    networks:
      - capstone_network

volumes:
  mysql_data:

networks:
  capstone_network:
    driver: bridge
